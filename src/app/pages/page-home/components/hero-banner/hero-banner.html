<section class="hero">
    <!-- 🌟 Background Effects -->
    <div class="hero__bg">
        <div class="grid-pattern"></div>
        <div #glowLeft class="glow-effect glow-left"></div>
        <div #glowRight class="glow-effect glow-right"></div>
    </div>

    <!-- 📦 Contenu Principal Hero -->
    <div class="container hero__container" #heroContent>
        <h1 class="hero__title">
            Créons ensemble le <span class="text-gradient">site web ou l'application mobile</span> qui propulse votre activité.
        </h1>
        <p class="hero__description">
            Co-construisons la solution web ou mobile <strong>sur-mesure, intuitives et performantes</strong>
            qui fera grandir votre activité <strong>avec Évolia Tech</strong>.
        </p>
        <div class="hero__actions">
             <app-evo-button text="Nos Réalisations" link="#works" variant="solid" preset="green"></app-evo-button>
             <app-evo-button text="Nous Contacter" link="#contact" variant="outline" preset="cream"></app-evo-button>
        </div>
    </div>
</section>
