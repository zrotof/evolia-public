            <div class="carousel-container" #carouselContainer
                 (mouseenter)="pauseGallery()"

                @for (work of latestWorks; track $index) {
                <div class="work-card" (click)="onProjectChoosed($index)">
                    <div class="image-wrapper">
                        <!-- Image Optimisée -->
                        <img [ngSrc]="work.image" [alt]="work.title" fill priority>

                        </ul>
                           <div class="card-footer">

                        <button class="btn-see-more">

                        </button>
                    </div>

            <div class="nav-buttons">
