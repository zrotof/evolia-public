<div class="modal-header-content">
  <h2>{{ title() }}</h2>
  
  <!-- Cercle de progression qui sert aussi de bouton fermer -->
  <div class="progress-close" (click)="onClose()">
    <span class="close-label">Fermer</span>
    
    <div class="progress-circle">
      <svg viewBox="0 0 36 36">
        <path
          class="circle-bg"
          d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
        />
        <path
          class="circle-bar"
          [style.stroke-dasharray]="scrollProgress() + ', 100'"
          d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
        />
      </svg>
      <span class="percentage">{{ estimatedReadTime() }} min</span>
    </div>
  </div>
</div>
